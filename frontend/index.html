<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Flow</title>
    <meta name="description" content="A premium habit tracking dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="7" x2="22" y2="7" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8B5CF6" />
                            <stop offset="1" stop-color="#3B82F6" />
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="2" y1="19.5" x2="22" y2="19.5"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8B5CF6" />
                            <stop offset="1" stop-color="#3B82F6" />
                        </linearGradient>
                        <linearGradient id="paint2_linear" x1="2" y1="14.5" x2="22" y2="14.5"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8B5CF6" />
                            <stop offset="1" stop-color="#3B82F6" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Habit Flow</h1>
            </div>
            <p class="subtitle">Master your routine, elevate your life.</p>
        </header>

        <main>
            <section class="glass-panel add-habit-section">
                <form id="add-habit-form">
                    <div class="input-group">
                        <input type="text" id="habit-name" placeholder="What habit do you want to build?" required
                            autocomplete="off">
                        <button type="submit" class="btn-primary">
                            <span>Add Habit</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                </form>
            </section>

            <section class="habits-container">
                <div class="glass-panel">
                    <div class="list-header">
                        <h2>Your Habits</h2>
                        <div class="stats" id="stats">
                            <span class="badge">0 / 0 Completed</span>
                        </div>
                    </div>

                    <div id="loading" class="loading">
                        <div class="spinner"></div>
                        <p>Loading your habits...</p>
                    </div>

                    <ul id="habit-list" class="habit-list hidden">
                        <!-- Habits will be injected here by JS -->
                    </ul>

                    <div id="empty-state" class="empty-state hidden">
                        <div class="empty-icon">🌱</div>
                        <h3>No habits yet</h3>
                        <p>Start your journey by adding a habit above.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Template for a single habit to be cloned by JS -->
    <template id="habit-template">
        <li class="habit-item">
            <label class="checkbox-container">
                <input type="checkbox" class="habit-checkbox">
                <span class="checkmark"></span>
            </label>
            <div class="habit-content">
                <span class="habit-text"></span>
            </div>
            <button class="btn-icon delete-btn" aria-label="Delete habit" title="Delete">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
        </li>
    </template>

    <!-- SRE Chaos Panel -->
    <div class="chaos-panel">
        <h3 class="chaos-title">bug</h3>
        <div class="chaos-buttons">
            <button id="btn-latency" class="chaos-btn">Simulate High Latency (SLO Breach)</button>
            <button id="btn-errors" class="chaos-btn">Simulate 500 Errors (Alert Trigger)</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
